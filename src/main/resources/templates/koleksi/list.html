<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::title}, ~{::main})}"
>
  <head>
    <title>Kelola Koleksi — Figure Collector</title>
  </head>
  <body>
    <main>
      <div
        class="page-header"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <div>
          <h1><i class="ti ti-box"></i> Kelola Koleksi</h1>
          <p>
            Tambah, edit, dan kelola koleksi action figure &amp; gundam kamu
          </p>
        </div>
        <a th:href="@{/koleksi/add}" class="btn btn-primary">
          <i class="ti ti-plus"></i> Tambah Koleksi
        </a>
      </div>

      <!-- Flash messages -->
      <div th:if="${successMessage}" class="alert alert-success">
        <i class="ti ti-circle-check"></i>
        <span th:text="${successMessage}"></span>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger">
        <i class="ti ti-alert-circle"></i>
        <span th:text="${errorMessage}"></span>
      </div>

      <!-- SEARCH + FILTER -->
      <div class="search-bar">
        <div style="position: relative; flex: 1">
          <i
            class="ti ti-search"
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: var(--text-muted);
              font-size: 15px;
            "
          ></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Cari nama barang..."
            onkeyup="filterTable()"
            style="padding-left: 36px"
          />
        </div>
        <select id="filterStatus" onchange="filterTable()">
          <option value="">Semua Status</option>
          <option value="Dikoleksi">Dikoleksi</option>
          <option value="Dijual">Dijual</option>
          <option value="Terjual">Terjual</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="table-container">
        <div class="table-header">
          <h3>
            <i class="ti ti-list" style="margin-right: 6px"></i> Daftar Koleksi
          </h3>
          <span
            class="text-muted"
            style="font-size: 0.85rem"
            id="itemCount"
          ></span>
        </div>
        <div class="table-wrap">
          <table id="koleksiTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Nama Barang</th>
                <th>Kategori</th>
                <th>Harga Beli</th>
                <th>Harga Jual</th>
                <th>Kondisi</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item, stat : ${items}">
                <td style="color: var(--text-muted)" th:text="${stat.count}">
                  1
                </td>
                <td th:text="${item.namaBarang}">-</td>
                <td>
                  <span
                    th:if="${item.kategori != null}"
                    class="badge badge-amber"
                    th:text="${item.kategori.namaKategori}"
                    >-</span
                  >
                  <span th:if="${item.kategori == null}" class="text-muted"
                    >-</span
                  >
                </td>
                <td style="font-family: &quot;Courier New&quot;, monospace">
                  Rp
                  <span
                    th:text="${#numbers.formatInteger(item.hargaBeli, 0, 'COMMA')}"
                    >0</span
                  >
                </td>
                <td
                  th:if="${item.hargaJual != null}"
                  style="font-family: &quot;Courier New&quot;, monospace"
                >
                  Rp
                  <span
                    th:text="${#numbers.formatInteger(item.hargaJual, 0, 'COMMA')}"
                    >0</span
                  >
                </td>
                <td th:if="${item.hargaJual == null}" class="text-muted">-</td>
                <td class="text-muted" th:text="${item.kondisi}">-</td>
                <td>
                  <span
                    class="badge"
                    th:classappend="${item.statusBarang == 'Dikoleksi'} ? 'badge-blue' : (${item.statusBarang == 'Dijual'} ? 'badge-red' : 'badge-green')"
                    th:text="${item.statusBarang}"
                    >-</span
                  >
                </td>
                <td>
                  <div style="display: flex; gap: 6px">
                    <a
                      th:href="@{'/koleksi/edit/' + ${item.idKoleksi}}"
                      class="btn btn-secondary btn-sm"
                    >
                      <i class="ti ti-edit"></i>
                    </a>
                    <a
                      th:href="@{'/koleksi/delete/' + ${item.idKoleksi}}"
                      onclick="return confirm('Yakin hapus item ini?');"
                      class="btn btn-danger btn-sm"
                    >
                      <i class="ti ti-trash"></i>
                    </a>
                  </div>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="8">
                  <div class="empty-state">
                    <div class="empty-icon"><i class="ti ti-package"></i></div>
                    <div class="empty-title">Belum ada koleksi</div>
                    <a th:href="@{/koleksi/add}" class="btn btn-primary mt-2">
                      <i class="ti ti-plus"></i> Tambah Sekarang
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <script>
        function filterTable() {
          const search = document
            .getElementById("searchInput")
            .value.toLowerCase();
          const status = document
            .getElementById("filterStatus")
            .value.toLowerCase();
          const rows = document.querySelectorAll("#koleksiTable tbody tr");
          let count = 0;
          rows.forEach((row) => {
            if (row.cells.length < 7) return;
            const name = row.cells[1]?.textContent.toLowerCase() || "";
            const rowStatus =
              row.cells[6]?.textContent.trim().toLowerCase() || "";
            const matchName = name.includes(search);
            const matchStatus = !status || rowStatus === status.toLowerCase();
            if (matchName && matchStatus) {
              row.style.display = "";
              count++;
            } else row.style.display = "none";
          });
          document.getElementById("itemCount").textContent = count + " item";
        }
        filterTable();
      </script>
    </main>
  </body>
</html>
