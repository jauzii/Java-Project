<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Profile - Figure Collector</title></head>
<body>
<main>
  <div class="page-header">
    <h1>&#x1F464; Profile</h1>
    <p>Informasi akun kamu</p>
  </div>

  <div class="form-card" style="max-width:400px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="width:80px;height:80px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem;">
        &#x1F464;
      </div>
      <div style="font-size:1.5rem;font-weight:700;" th:text="${username}">admin</div>
      <div style="color:var(--text2);font-size:0.85rem;margin-top:0.25rem;">Administrator</div>
    </div>

    <div style="border-top:1px solid var(--border);padding-top:1.5rem;">
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--text2);font-size:0.85rem;">Username</span>
        <span style="font-weight:500;" th:text="${username}">admin</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--text2);font-size:0.85rem;">Role</span>
        <span class="badge badge-blue">Admin</span>
      </div>
    </div>

    <div style="margin-top:1.5rem;">
      <a th:href="@{/logout}" class="btn btn-danger" style="width:100%;justify-content:center;">Logout</a>
    </div>
  </div>
</main>
</body>
</html>
