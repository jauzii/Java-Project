<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::title}, ~{::main})}"
>
  <head>
    <title>Form Koleksi — Figure Collector</title>
  </head>
  <body>
    <main>
      <div
        class="page-header"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <div>
          <h1
            th:text="${koleksi.idKoleksi == null} ? '➕ Tambah Koleksi' : '✏️ Edit Koleksi'"
          >
            Form Koleksi
          </h1>
          <p>Isi data koleksi action figure atau gundam kamu</p>
        </div>
        <a th:href="@{/koleksi}" class="btn btn-secondary">← Kembali</a>
      </div>

      <div class="form-card">
        <form th:action="@{/koleksi/save}" th:object="${koleksi}" method="post">
          <input type="hidden" th:field="*{idKoleksi}" />
          <div class="form-group">
            <label>Nama Barang</label>
            <input
              type="text"
              th:field="*{namaBarang}"
              placeholder="Contoh: RX-78-2 Gundam MG"
              required
            />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
            <div class="form-group">
              <label>Harga Beli (Rp)</label>
              <input
                type="number"
                th:field="*{hargaBeli}"
                placeholder="0"
                min="0"
              />
            </div>
            <div class="form-group">
              <label>Harga Jual (Rp)</label>
              <input
                type="number"
                th:field="*{hargaJual}"
                placeholder="0 (opsional)"
                min="0"
              />
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
            <div class="form-group">
              <label>Kondisi</label>
              <select th:field="*{kondisi}">
                <option value="">-- Pilih Kondisi --</option>
                <option value="Baru">Baru</option>
                <option value="Bagus">Bagus</option>
                <option value="Bekas">Bekas</option>
                <option value="Rusak">Rusak</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select th:field="*{statusBarang}">
                <option value="Dikoleksi">Dikoleksi</option>
                <option value="Dijual">Dijual</option>
                <option value="Terjual">Terjual</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Kategori</label>
            <select th:field="*{kategori.idKategori}">
              <option value="">-- Pilih Kategori --</option>
              <option
                th:each="c : ${categories}"
                th:value="${c.idKategori}"
                th:text="${c.namaKategori}"
              ></option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Simpan</button>
            <a th:href="@{/koleksi}" class="btn btn-secondary">Batal</a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
