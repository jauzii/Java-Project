<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::title}, ~{::main})}"
>
  <head>
    <title>Profile - Figure Collector</title>
  </head>

  <body>
    <main
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: calc(100vh - 90px);
        padding: 2rem 1rem;
      "
    >
      <div class="page-header" style="text-align: center; width: 100%">
        <h1><i class="ti ti-user"></i> Profile</h1>
        <p>Informasi akun kamu</p>
      </div>

      <div class="form-card" style="max-width: 400px; width: 100%">
        <div style="text-align: center; margin-bottom: 1.75rem">
          <div
            style="
              width: 80px;
              height: 80px;
              border-radius: 50%;
              background: linear-gradient(
                135deg,
                var(--accent) 0%,
                var(--accent2) 100%
              );
              display: flex;
              align-items: center;
              justify-content: center;
              margin: 0 auto 1rem;
              box-shadow: 0 8px 20px rgba(230, 57, 70, 0.25);
            "
          >
            <i class="ti ti-user" style="font-size: 2rem; color: #fff"></i>
          </div>

          <div
            style="font-size: 1.4rem; font-weight: 700; letter-spacing: -0.01em"
            th:text="${username}"
          >
            admin
          </div>

          <div
            style="color: var(--text2); font-size: 0.85rem; margin-top: 0.25rem"
          >
            Administrator
          </div>
        </div>

        <div style="border-top: 1px solid var(--border)">
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 0.85rem 0;
              border-bottom: 1px solid var(--border);
            "
          >
            <span
              style="
                display: flex;
                align-items: center;
                gap: 0.5rem;
                color: var(--text2);
                font-size: 0.85rem;
              "
            >
              <i class="ti ti-user-circle"></i>
              Username
            </span>

            <span
              style="font-weight: 500; font-size: 0.9rem"
              th:text="${username}"
            >
              admin
            </span>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 0.85rem 0;
              border-bottom: 1px solid var(--border);
            "
          >
            <span
              style="
                display: flex;
                align-items: center;
                gap: 0.5rem;
                color: var(--text2);
                font-size: 0.85rem;
              "
            >
              <i class="ti ti-shield-check"></i>
              Role
            </span>

            <span class="badge badge-blue">Admin</span>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 0.85rem 0;
            "
          >
            <span
              style="
                display: flex;
                align-items: center;
                gap: 0.5rem;
                color: var(--text2);
                font-size: 0.85rem;
              "
            >
              <i class="ti ti-circle-check"></i>
              Status
            </span>

            <span class="badge badge-green">Aktif</span>
          </div>
        </div>

        <div style="margin-top: 1.5rem">
          <a
            th:href="@{/logout}"
            class="btn btn-danger"
            style="width: 100%; justify-content: center"
          >
            <i class="ti ti-logout"></i>
            Logout
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
